# Yaad infrastructure — dedicated Postgres + Redis (per-app, like leadkar/invoicegraph).
# Bound to localhost only; never exposed publicly.
services:
  redis:
    image: redis:7-alpine
    container_name: yaad-redis-1
    ports:
      - "127.0.0.1:6382:6379"   # 6379=invoicegraph, 6381=nexus; Yaad on 6382
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: yaad-postgres-1
    # Raised from the default 100 so 4 API workers (each with its own pool) plus the
    # reconcile timer + manual psql/Alembic stay comfortably within the ceiling.
    command: ["postgres", "-c", "max_connections=200"]
    environment:
      POSTGRES_DB: yaad
      POSTGRES_USER: yaad
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - yaad_pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5434:5432"   # 5432=invoicegraph; Yaad on 5434
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yaad"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  yaad_pgdata:
